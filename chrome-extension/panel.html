<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: #252526;
      border-bottom: 1px solid #3c3c3c;
      flex-shrink: 0;
    }
    #filter-input {
      flex: 1;
      padding: 4px 8px;
      background: #3c3c3c;
      border: 1px solid #555;
      color: #d4d4d4;
      border-radius: 3px;
      font-size: 12px;
    }
    #filter-input:focus { outline: none; border-color: #007acc; }
    button {
      padding: 4px 10px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
    }
    #clear-btn { background: #3c3c3c; color: #d4d4d4; }
    #clear-btn:hover { background: #4c4c4c; }
    #send-btn { background: #0e639c; color: white; font-weight: 600; }
    #send-btn:hover:not(:disabled) { background: #1177bb; }
    #send-btn:disabled { background: #3c3c3c; color: #6d6d6d; cursor: not-allowed; }
    #status {
      color: #858585;
      white-space: nowrap;
      font-size: 11px;
    }
    #request-list {
      flex: 1;
      overflow-y: auto;
    }
    .request-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-bottom: 1px solid #2d2d2d;
      cursor: pointer;
    }
    .request-row:hover { background: #2a2d2e; }
    .request-row.selected { background: #04395e; }
    .request-row input[type="checkbox"] { cursor: pointer; flex-shrink: 0; }
    .method {
      font-weight: 700;
      min-width: 50px;
      font-size: 11px;
      font-family: monospace;
    }
    .method.GET { color: #4ec9b0; }
    .method.POST { color: #569cd6; }
    .method.PUT { color: #ce9178; }
    .method.DELETE { color: #f44747; }
    .method.PATCH { color: #dcdcaa; }
    .status-code { min-width: 32px; font-family: monospace; font-size: 11px; color: #858585; }
    .status-code.ok { color: #4ec9b0; }
    .status-code.err { color: #f44747; }
    .url {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: monospace;
      font-size: 11px;
      color: #9cdcfe;
    }
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #6d6d6d;
      gap: 8px;
    }
    #empty-state .icon { font-size: 32px; }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="refresh-btn">Refresh</button>
    <button id="clear-btn">Clear</button>
    <input id="filter-input" type="text" placeholder="Filter by URL...">
    <span id="status">0 captured &nbsp;|&nbsp; 0 selected</span>
    <button id="send-btn" disabled>Send to VS Code</button>
  </div>
  <div id="request-list">
    <div id="empty-state">
      <span class="icon">🌐</span>
      <span>Browse your app — network requests will appear here</span>
    </div>
  </div>
  <script src="shared.js"></script>
  <script src="panel.js"></script>
</body>
</html>
